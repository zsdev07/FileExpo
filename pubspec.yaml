name: file_expo
description: A simple and feature-rich Android file explorer.
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  path: ^1.8.3
  intl: ^0.19.0
  photo_view: ^0.14.0
  audioplayers: ^5.2.1
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  share_plus: ^7.2.2
  archive: ^3.4.10
  fl_chart: ^0.66.0
  device_apps: ^2.2.0
  package_info_plus: ^5.0.1
  shelf: ^1.4.1
  shelf_static: ^1.1.2
  googleapis: ^13.1.0
  google_sign_in: ^6.2.1
  extension_google_sign_in_as_googleapis_auth: ">=2.0.0 <2.0.13"
  ftpconnect: ^2.0.7
  network_info_plus: ^5.0.1
  http: ^1.2.1
  local_auth: ^2.1.6
  encrypt: ^5.0.3
  crypto: ^3.0.3
  video_player: ^2.8.1
  chewie: ^1.7.1
  flutter_pdfview: ^1.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
