name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get
        working-directory: FileExpo

      - name: Build APK
        run: flutter build apk --release
        working-directory: FileExpo

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FileExpo-Release-APK
          path: FileExpo/build/app/outputs/flutter-apk/app-release.apk
