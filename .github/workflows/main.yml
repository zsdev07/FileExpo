name: FileExpo CI/CD Build

# Trigger the workflow on pushes and pull requests to the main/master branch
on:
  push:
    branches:[ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository code
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Set up Java 17 (Required for AGP 8.0+)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle' # Automatically caches Gradle dependencies to speed up future builds

      # 3. Grant execution permissions to the Gradle Wrapper
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Build the Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 5. Build the Release APK (Unsigned)
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      # 6. Upload Debug APK as a GitHub Artifact
      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileExpo-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # 7. Upload Unsigned Release APK as a GitHub Artifact
      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileExpo-Release-Unsigned-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7
